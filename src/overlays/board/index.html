<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/icon.png" />
    <title>Plinko Board</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: transparent;
        overflow: hidden;
        font-family: 'Segoe UI', system-ui, sans-serif;
      }
      #stage {
        position: absolute;
        inset: 0;
      }
      #stage canvas {
        display: block;
      }
      #clock {
        position: absolute;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 28px;
        font-weight: 800;
        font-variant-numeric: tabular-nums;
        color: #fff;
        text-shadow:
          0 0 10px #ff4d8d,
          0 0 24px #ff4d8daa;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="stage"></div>
    <div id="clock">—:—:—</div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
