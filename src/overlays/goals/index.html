<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/icon.png" />
    <title>Plinko Goals</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: transparent;
        overflow: hidden;
        font-family: var(--font, 'Segoe UI', system-ui, sans-serif);
      }
      #bar {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 20px;
        padding: 10px 18px;
      }
      .stat {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 8px 18px;
        border-radius: var(--radius, 12px);
        background: var(--panel, rgba(20, 16, 31, 0.82));
        box-shadow: inset 0 0 0 1px var(--accent, rgba(255, 77, 141, 0.4));
        min-width: 92px;
      }
      .stat .value {
        font-size: var(--goal-size, 30px);
        font-weight: 800;
        font-variant-numeric: tabular-nums;
        color: var(--goal-value, #fff);
        text-shadow: 0 0 12px var(--accent, #ff4d8d88);
      }
      .stat .label {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--muted, #cbb9e6);
        margin-top: 2px;
      }
      .stat.timer .value {
        color: var(--goal-timer, #ffd6e8);
      }
    </style>
  </head>
  <body>
    <div id="bar"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
