<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/icon.png" />
    <title>Subathon Timer</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: transparent;
        overflow: hidden;
        font-family: var(--font, 'Segoe UI', system-ui, sans-serif);
      }
      #app {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.4vmin;
      }
      .timer {
        font-size: var(--timer-size, 16vmin);
        font-weight: 800;
        font-variant-numeric: tabular-nums;
        color: var(--timer-color, #ffffff);
        text-shadow:
          0 0 14px var(--timer-glow, #ff4d8d),
          0 0 40px var(--timer-glow, #ff4d8d);
        letter-spacing: 0.4vmin;
        padding: 2vmin 4vmin;
        border-radius: var(--radius, 10px);
      }
      #app.panel .timer {
        background: var(--panel, rgba(20, 16, 31, 0.82));
      }
      .mode {
        font-size: 3vmin;
        text-transform: uppercase;
        letter-spacing: 0.6vmin;
        color: var(--muted, #ffb3d1);
        opacity: 0.85;
      }
      .mode:empty {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="timer" id="timer">—:—:—</div>
      <div class="mode" id="mode"></div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
